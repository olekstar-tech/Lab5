name: Claude Review
on:
  pull_request:
    types: [opened, synchronize]
permissions:
  pull-requests: write
  contents: read
jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Compute diff against base
        run: |
          git diff origin/${{ github.base_ref }}...HEAD > diff.txt
          wc -l diff.txt
      - name: Install Claude Code
        run: npm i -g @anthropic-ai/claude-code
      - name: Run Claude in headless mode
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTROPIC_PRIVAT }}
        run: |
          claude -p --output-format json \
            --json-schema "$(cat .claude/review-schema.json)" \
            < diff.txt > findings.json
      - name: Show findings (debug)
        run: cat findings.json
      - name: Post findings as inline comments
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          COMMIT_SHA=$(git rev-parse HEAD)
          jq -c '.structured_output.findings[]' findings.json | while read finding; do
            FILE=$(echo "$finding" | jq -r .file)
            LINE=$(echo "$finding" | jq -r .line)
            SEV=$(echo "$finding" | jq -r .severity)
            CAT=$(echo "$finding" | jq -r .category)
            MSG=$(echo "$finding" | jq -r .message)
            SUG=$(echo "$finding" | jq -r '.suggestion // ""')
            BODY="**$SEV** ($CAT): $MSG"
            if [ -n "$SUG" ]; then
              BODY="$BODY"$'\n\n'"_Suggestion:_ $SUG"
            fi
            gh api \
              repos/${{ github.repository }}/pulls/${{ github.event.number }}/comments \
              --method POST \
              -f commit_id="$COMMIT_SHA" \
              -f path="$FILE" \
              -f line="$LINE" \
              -f side=RIGHT \
              -f body="$BODY"
          done
