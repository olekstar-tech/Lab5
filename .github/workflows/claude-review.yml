name: Claude Review
on:
  pull_request:
    types: [opened, synchronize]
permissions:
  pull-requests: write
  contents: read
jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Compute diff against base
        run: |
          git diff origin/${{ github.base_ref }}...HEAD > diff.txt
          wc -l diff.txt
      - name: Install Claude Code
        run: npm i -g @anthropic-ai/claude-code
      - name: Run Claude in headless mode
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTROPIC_PRIVAT }}
        run: |
          claude -p --model claude-haiku-4-5 --output-format json \
            --json-schema "$(cat .claude/review-schema.json)" \
            < diff.txt \
            | sed 's/\x1b\[[0-9;?]*[A-Za-z]//g' \
            > findings.json
      - name: Show findings (debug)
        run: cat findings.json
      - name: Post findings as BULK comment (baseline comparison)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BULK="## Claude Review Findings"$'\n\n'
          while IFS= read -r finding; do
            FILE=$(echo "$finding" | jq -r .file)
            LINE=$(echo "$finding" | jq -r .line)
            SEV=$(echo "$finding" | jq -r .severity)
            CAT=$(echo "$finding" | jq -r .category)
            MSG=$(echo "$finding" | jq -r .message)
            SUG=$(echo "$finding" | jq -r '.suggestion // ""')
            BULK="$BULK- **$SEV** ($CAT) — \`$FILE\` line $LINE: $MSG"
            if [ -n "$SUG" ]; then
              BULK="$BULK — _Suggestion:_ $SUG"
            fi
            BULK="$BULK"$'\n'
          done < <(jq -rsc 'last | .structured_output.findings[]' findings.json)
          gh pr comment ${{ github.event.number }} --body "$BULK"
